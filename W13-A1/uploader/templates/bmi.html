<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BMI Calculator</title>
    <style>
        /* Existing styles... */
        body { font-family: sans-serif; max-width: 450px; margin: 40px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        
        /* Button Styles */
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-submit { flex: 2; padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .btn-home { flex: 1; padding: 10px; background-color: #6c757d; color: white; border: none; cursor: pointer; border-radius: 4px; text-decoration: none; text-align: center; font-size: 14px; }
        .btn-submit:hover { background-color: #218838; }
        .btn-home:hover { background-color: #5a6268; }
        
        #result-section { margin-top: 20px; padding: 15px; background: #f4f4f4; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>BMI & Diet Suggestion</h2>
    
    <form method="POST">
        {% csrf_token %}
        <div class="field">
            <label>Weight (kg):</label>
            <input type="number" name="weight" step="0.1" required>
        </div>

        <div class="field">
            <label>Height (m):</label>
            <input type="number" name="height" step="0.01" required>
        </div>

        <div class="field">
            <label>Age:</label>
            <input type="number" name="age" required>
        </div>

        <div class="field">
            <label>Sex:</label>
            <select name="gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn-submit">Get Suggestion</button>
            <a href="{% url 'home' %}" class="btn-home">Home</a>
        </div>
    </form>

    {% if result %}
    <div id="result-section">
        <p><strong>BMI:</strong> {{ result.value }} ({{ result.category }})</p>
        <hr>
        <p><strong>AI Diet Recommendation:</strong></p>
        <div>{{ diet_suggestion|linebreaks }}</div>
    </div>
    {% endif %}

</body>
</html>
