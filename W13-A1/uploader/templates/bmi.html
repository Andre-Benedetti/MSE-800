<div class="container">
    <h2>BMI Calculator</h2>
    <form method="post">
        {% csrf_token %}
        <input type="number" step="0.1" name="weight" placeholder="Weight (kg)" required>
        <input type="number" step="0.01" name="height" placeholder="Height (m)" required>
        <button type="submit">Calculate</button>
    </form>

    {% if result %}
        <div class="result" style="margin-top: 20px; padding: 15px; background: #f4f4f4;">
            <p><strong>BMI:</strong> {{ result.value }}</p>
            <p><strong>Status:</strong> {{ result.category }}</p>
        </div>
    {% endif %}
    <br>
    <a href="{% url 'home' %}">Back to Home</a>
</div>
